; background-size: cover; background-position: center;"></div><div class="card-content"><h3 class="card-title">数码</h3><div class="card-description"><p>研究点有意思的</p></div><div class="card-icon"><i class="fas fa-heart"></i></div><div class="card-hover-content"><p></p></div></div></a></div><div class="about-details"><div class="about-section"><h2>关于我</h2><div class="intro-card-wrapper"><div class="intro-banner-bg"><img src="/images/1.jpg" alt="Banner" onerror="this.style.display='none'"><div class="banner-overlay"></div></div><div class="profile-info-content"><div class="profile-item" data-label="称呼">Makitoid</div><div class="profile-item" data-label="家乡">山东济南</div><div class="profile-item" data-label="大学">齐鲁工业大学</div><div class="profile-item" data-label="教育">大一在读</div></div></div></div><div class="about-section"><h2>兴趣点</h2><div class="interest-cloud"><span class="skill-tag">折腾电脑</span><span class="skill-tag">爬山</span><span class="skill-tag">数码</span><span class="skill-tag">地铁跑酷（暂时退坑）</span><span class="skill-tag">地铁跑酷城市（暂时退坑）</span><span class="skill-tag">绝区零</span><span class="skill-tag">乱涂！彩世界</span></div></div><div class="about-section"><h2>自我介绍</h2><div class="bio-content" style="white-space: pre-wrap;">一个普通的人。</div></div><div class="about-section"><h2>联系方式</h2><div class="contact-info"><a class="contact-item" href="mailto:makitoidyyds@gmail.com"><i class="fas fa-envelope"></i><div><div class="contact-label">邮箱</div><div class="contact-value">makitoidyyds@gmail.com</div></div></a><a class="contact-item" target="_blank" rel="noopener" href="https://github.com/makitoid"><i class="fab fa-github"></i><div><div class="contact-label">GitHub</div><div class="contact-value">makitoid</div></div></a><a class="contact-item" target="_blank" rel="noopener" href="https://space.bilibili.com/3690988600035392"><i class="fas fa-tv"></i><div><div class="contact-label">哔哩哔哩</div><div class="contact-value">Makitoid_wang</div></div></a></div></div></div></div></main><script>document.addEventListener('DOMContentLoaded', function() {
  // === 背景几何图形漫游 ===
  const shapeContainer = document.getElementById('background-shapes');
  if(shapeContainer) {
    shapeContainer.innerHTML = '';
    const shapeCount = 15;
    const shapes = [];

    for (let i = 0; i < shapeCount; i++) {
      const shape = document.createElement('div');
      shape.classList.add('shape');
      const type = Math.random();
      if (type < 0.33) shape.classList.add('shape-circle');
      else if (type < 0.66) shape.classList.add('shape-square');
      else shape.classList.add('shape-triangle');

      const size = Math.random() * 70 + 30;
      shape.style.width = `${size}px`;
      shape.style.height = `${size}px`;
      shape.style.opacity = Math.random() * 0.25 + 0.05;

      let x = Math.random() * window.innerWidth;
      let y = Math.random() * window.innerHeight;
      let vx = (Math.random() - 0.5) * 1.5;
      let vy = (Math.random() - 0.5) * 1.5;
      let r = Math.random() * 360;
      let vr = (Math.random() - 0.5) * 0.5;

      shapeContainer.appendChild(shape);
      shapes.push({ el: shape, x, y, vx, vy, r, vr });
    }

    function animateShapes() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      shapes.forEach(s => {
        s.x += s.vx; s.y += s.vy; s.r += s.vr;
        if (s.x <= -50 || s.x >= w + 50) s.vx *= -1;
        if (s.y <= -50 || s.y >= h + 50) s.vy *= -1;
        s.el.style.transform = `translate3d(${s.x}px, ${s.y}px, 0) rotate(${s.r}deg)`;
      });
      requestAnimationFrame(animateShapes);
    }
    animateShapes();
  }

  // === 卡片 3D ===
  const cards = document.querySelectorAll('.interest-card');
  cards.forEach(card => {
    card.addEventListener('mousemove', function(e) {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left - rect.width / 2;
      const y = e.clientY - rect.top - rect.height / 2;
      let rotateY = x / 40; 
      let rotateX = -y / 40;
      card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02) translateY(-10px)`;
    });
    card.addEventListener('mouseleave', function() {
      card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale3d(1, 1, 1) translateY(0)';
    });
  });
});</script></body></html></main><div id="waves-container"><svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto"><defs><path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z"></path></defs><g class="parallax"><use xlink:href="#gentle-wave" x="48" y="0"></use><use xlink:href="#gentle-wave" x="48" y="3"></use><use xlink:href="#gentle-wave" x="48" y="5"></use><use xlink:href="#gentle-wave" x="48" y="7"></use></g></svg></div><footer class="footer"><div class="footer-bottom"><div class="footer-copyright">© 2025 Makitoid. All rights reserved.</div><!-- Footer centered image with link--><div class="footer-badges"><a target="_blank" rel="noopener" href="https://hexo.io/" title="博客框架为Hexo_v8.1.0"><img src="https://npm.elemecdn.com/anzhiyu-blog@2.1.5/img/badge/Frame-Hexo.svg" alt="博客框架为Hexo_v8.1.0"/></a><a target="_blank" rel="noopener" href="http://creativecommons.org/licenses/by-nc-sa/4.0/" title="本站采用知识共享署名-非商业性使用-相同方式共享4.0国际许可协议进行许可"><img src="https://npm.elemecdn.com/anzhiyu-blog@2.2.0/img/badge/Copyright-BY-NC-SA.svg" alt="本站采用知识共享署名-非商业性使用-相同方式共享4.0国际许可协议进行许可"/></a></div></div></footer></div><!-- 立即应用暗色模式，避免页面闪烁--><script>(function() {
